# ─── Server ────────────────────────────────────────────────────────────────
sonar.host.url=http://localhost:9000/

# Token: supply via CLI flag or env variable — NEVER hardcode here.
#   Local:   sonar-scanner -Dsonar.token=<your-token>
#   Jenkins: injected automatically by withSonarQubeEnv('SonarQube')

# ─── Project Identification ─────────────────────────────────────────────────
sonar.projectKey=saas-application
sonar.projectName=Saas-Application
sonar.projectVersion=1.0

# ─── Source Paths ───────────────────────────────────────────────────────────
sonar.sources=backend/src,frontend/src
sonar.tests=backend/src,frontend/src
sonar.test.inclusions=**/*.spec.ts,**/*.spec.tsx,**/*.test.ts,**/*.test.tsx

sonar.exclusions=\
  **/node_modules/**,\
  **/.next/**,\
  **/dist/**,\
  **/prisma/**,\
  **/coverage/**

# ─── Coverage Reports ───────────────────────────────────────────────────────
sonar.javascript.lcov.reportPaths=\
  frontend/coverage/lcov.info,\
  backend/coverage/lcov.info

# ─── Language Settings ──────────────────────────────────────────────────────
sonar.typescript.tsconfigPath=frontend/tsconfig.json
sonar.javascript.environments=node
